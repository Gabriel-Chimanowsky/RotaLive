version: '3.3'

services:
  evolution-api:
    image: atendai/evolution-api:v2.2.1
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=rotalive_master_key
      - AUTHENTICATION_EXPOSE_IN_ENV=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@postgres:5432/evolution
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    ports:
      - "5433:5432" # Exposed on 5433 locally to prevent conflicts
    volumes:
      - evolution_db:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: evolution_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6380:6379" # Exposed on 6380 locally to prevent conflicts
    volumes:
      - evolution_redis:/data

volumes:
  evolution_db:
  evolution_redis:
