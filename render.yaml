databases:
  - name: rotalive-db

services:
  - type: web
    name: rotalive-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rotalive-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: rotalive-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://rotalive-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://rotalive-backend.onrender.com
