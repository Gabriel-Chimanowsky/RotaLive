databases:
  - name: rotalivedb
    plan: free

services:
  - type: web
    name: rotalive-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rotalivedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: rotalive-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://rotalive-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://rotalive-backend.onrender.com
