services:
  # --- Backend Service ---
  - type: web
    name: rotalive-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rotalive-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://rotalive.onrender.com # Change this to your frontend URL later

  # --- Frontend Service ---
  - type: web
    name: rotalive-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: rotalive-backend
          property: host
      - key: VITE_WS_URL
        fromService:
          type: web
          name: rotalive-backend
          property: host
        # Note: Render usually handles ws:// to wss:// automatically if using the host property

databases:
  - name: rotalive-db
    plan: free
